name: CI -- ROS2 Surveillance Robot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test ROS2 Package
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ROS2 Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ros-jazzy-cv-bridge \
            ros-jazzy-vision-opencv \
            python3-opencv

      - name: Build package
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --packages-select surveillance_robot

      - name: Run tests
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          colcon test --packages-select surveillance_robot
          colcon test-result --verbose
